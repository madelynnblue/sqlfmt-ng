<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>sqlfmtng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Archivo+Black&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --fg: #0a0a0a;
      --bg: #f5f5f0;
      --accent: #ff3366;
      --gray: #666;
      --border: #000;
      --surface: #fff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f5f5f0;
        --bg: #0a0a0a;
        --accent: #ff3366;
        --gray: #999;
        --border: #333;
        --surface: #1a1a1a;
      }
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 0;
      overflow-x: hidden;
    }

    .header {
      background: var(--fg);
      color: var(--bg);
      padding: 24px 20px;
      border-bottom: 4px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to   { transform: translateY(0); }
    }

    h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: 32px;
      letter-spacing: -1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .tagline {
      opacity: 0.7;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 20px;
      margin-bottom: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: 1fr;
      }
    }

    .editor-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    textarea {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      background: var(--surface);
      color: var(--fg);
      border: 2px solid var(--border);
      padding: 16px;
      width: 100%;
      height: 280px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    .slider-container {
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 16px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      background: var(--bg);
      border: 2px solid var(--border);
      outline: none;
      appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 24px;
      height: 24px;
      background: var(--accent);
      border: 2px solid var(--border);
      cursor: grab;
    }

    input[type="range"]::-webkit-slider-thumb:active {
      cursor: grabbing;
    }

    input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border: 2px solid var(--border);
      cursor: grab;
      border-radius: 0;
    }

    .options {
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .option-group {
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .option-group:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .option-title {
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: var(--accent);
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 6px;
    }

    input[type="checkbox"],
    input[type="radio"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    input[type="checkbox"]:checked,
    input[type="radio"]:checked {
      background: var(--accent);
    }

    input[type="checkbox"]:checked::after {
      content: '×';
      position: absolute;
      top: -4px;
      left: 2px;
      color: var(--bg);
      font-size: 18px;
      font-weight: 700;
    }

    input[type="radio"] {
      border-radius: 50%;
    }

    input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 6px;
      height: 6px;
      background: var(--bg);
      border-radius: 50%;
    }

    input[type="number"] {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      width: 60px;
      padding: 4px 8px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--fg);
    }

    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 16px;
      background: var(--fg);
      color: var(--bg);
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover {
      background: var(--accent);
      color: var(--bg);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 var(--border);
    }

    button:active {
      transform: translate(0, 0);
      box-shadow: none;
    }

    .stats {
      font-size: 11px;
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      gap: 8px;
    }

    .stat-label {
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-weight: 700;
      color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .output {
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 20px;
      margin-bottom: 20px;
    }

    pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      overflow-x: auto;
      line-height: 1.6;
      white-space: pre;
    }

    .footer {
      font-size: 11px;
      padding: 20px;
      border-top: 2px solid var(--border);
      display: flex;
      gap: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }

    a:hover {
      border-bottom-color: var(--accent);
    }

    .jsonly {
      display: none;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>sqlfmtng</h1>
    <div class="tagline">Type some SQL. Move the slider to set output width.</div>
  </div>

  <div class="container">
    <form name="theform">
      <div class="workspace">
        <div class="editor-section">
          <textarea id="sql" name="sql" spellcheck="false" placeholder="PASTE YOUR SQL HERE"></textarea>

          <div class="slider-container">
            <div class="slider-label">
              <span>Line Width</span>
              <span id="nval">80</span>
            </div>
            <input type="range" min="1" max="200" step="1" name="n" value="80" id="n">
          </div>
        </div>

        <div class="options">
          <div class="option-group">
            <div class="option-title">Dialect</div>
            <label>
              <input type="radio" name="dialect" value="materialize" checked>
              <span>Materialize</span>
            </label>
            <label>
              <input type="radio" name="dialect" value="postgres">
              <span>Postgres</span>
            </label>
          </div>

          <div class="option-group">
            <div class="option-title">Format</div>
            <label>
              <span>Tab Width</span>
              <input type="number" min="1" max="16" step="1" name="indent" value="4" id="indent">
            </label>
            <label>
              <input type="checkbox" name="spaces" id="spaces">
              <span>Use Spaces</span>
            </label>
          </div>

          <div class="option-group">
            <div class="option-title">Case</div>
            <label>
              <input type="radio" name="case" value="upper" checked>
              <span>Upper</span>
            </label>
            <label>
              <input type="radio" name="case" value="lower">
              <span>Lower</span>
            </label>
            <label>
              <input type="radio" name="case" value="title">
              <span>Title</span>
            </label>
          </div>

          <div class="option-group">
            <button type="button" id="reset">Reset</button>
            <button type="button" id="clear" style="margin-top: 8px;">Clear</button>
            <label style="margin-top: 8px;">
              <input type="checkbox" name="paste" id="paste">
              <span>Auto Paste</span>
            </label>
          </div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Target:</span>
          <span class="stat-value" id="nval2">80</span>
        </div>
        <div class="stat">
          <span class="stat-label">Actual:</span>
          <span class="stat-value" id="actual_width">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Bytes:</span>
          <span class="stat-value" id="actual_bytes">—</span>
        </div>
      </div>

      <div class="actions jsonly">
        <button type="button" id="copy">Copy to Clipboard</button>
        <a href="" id="share"><button type="button">Share</button></a>
      </div>

      <input type="submit" id="submitButton" style="display: none;">
    </form>

    <div class="output">
      <pre id="fmt"></pre>
    </div>

    <div class="footer">
      <span>WASM EDITION</span>
      <a href="https://github.com/madelynnblue/sqlfmtng">GITHUB</a>
    </div>
  </div>

  <!-- import map so the bare "protobufjs/minimal.js" specifier inside libpg-query-wasm resolves in the browser -->
  <script type="importmap">
  {
    "imports": {
      "protobufjs/minimal.js": "https://esm.sh/protobufjs@7.2.5/minimal.js"
    }
  }
  </script>

  <script type="module">
    import init, { fmt, fmt_postgres_protobuf } from './wasm/sqlfmt_web.js';

    await init({ module_or_path: './wasm/sqlfmt_web_bg.wasm' });

    let pgParse = null;
    let ParseResult = null;
    async function ensurePostgres() {
      if (pgParse) return;
      // import directly from the ESM dist file; relative sub-imports resolve via jsdelivr CDN
      ({ parse: pgParse, ParseResult } = await import('https://cdn.jsdelivr.net/npm/libpg-query-wasm@0.2.1/dist/main.js'));
    }

    document.getElementById('submitButton').style.display = 'none';
    document.querySelectorAll('.jsonly').forEach(el => el.style.display = 'inline');

    const sqlEl          = document.getElementById('sql');
    const nEl            = document.getElementById('n');
    const indentEl       = document.getElementById('indent');
    const spacesEl       = document.getElementById('spaces');
    const fmtEl          = document.getElementById('fmt');
    const actualWidthEl  = document.getElementById('actual_width');
    const actualBytesEl  = document.getElementById('actual_bytes');
    const shareEl        = document.getElementById('share');
    const pasteEl        = document.getElementById('paste');

    let fmtText = '';

    function b64EncodeUnicode(str) {
      return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode('0x' + p1)));
    }

    function b64DecodeUnicode(str) {
      return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    }

    function copyTextToClipboard(text) {
      const area = document.createElement('textarea');
      Object.assign(area.style, { position: 'fixed', top: 0, left: 0, width: '2em', height: '2em', padding: 0, border: 'none', outline: 'none', boxShadow: 'none', background: 'transparent' });
      area.value = text;
      document.body.appendChild(area);
      area.focus();
      area.select();
      try { document.execCommand('copy'); } catch {}
      document.body.removeChild(area);
    }

    function getDialect() { return document.querySelector('input[name="dialect"]:checked')?.value ?? 'materialize'; }
    function getCase()    { return document.querySelector('input[name="case"]:checked')?.value ?? 'upper'; }

    async function range() {
      const v       = parseInt(nEl.value);
      const viw     = parseInt(indentEl.value);
      const sql     = sqlEl.value;
      const useTabs = !spacesEl.checked;
      const dialect = getDialect();
      const caseMode = getCase();

      document.getElementById('nval').textContent  = v;
      document.getElementById('nval2').textContent = v;
      fmtEl.style['tab-size']      = viw;
      fmtEl.style['-moz-tab-size'] = viw;

      localStorage.setItem('sql',     sql);
      localStorage.setItem('n',       v);
      localStorage.setItem('iw',      viw);
      localStorage.setItem('spaces',  spacesEl.checked ? '1' : '0');
      localStorage.setItem('dialect', dialect);
      localStorage.setItem('case',    caseMode);

      shareEl.href = '/?n=' + v + '&indent=' + viw +
        '&spaces='  + (spacesEl.checked ? '1' : '0') +
        '&dialect=' + encodeURIComponent(dialect) +
        '&case='    + encodeURIComponent(caseMode) +
        '&sql='     + encodeURIComponent(b64EncodeUnicode(sql));

      try {
        let result;
        if (dialect === 'postgres') {
          await ensurePostgres();
          const bytes = ParseResult.encode(pgParse(sql)).finish();
          result = fmt_postgres_protobuf(bytes, v, viw, useTabs, caseMode);
        } else {
          result = fmt(sql, dialect, v, viw, useTabs, caseMode);
        }
        fmtText = result;
        actualWidthEl.textContent = Math.max(0, ...result.split('\n').map(l => l.length));
        actualBytesEl.textContent = result.length;
        let hLine = '--';
        if (v > 2) hLine += '-'.repeat(v - 2);
        fmtEl.textContent = hLine + '\n\n' + result;
      } catch (e) {
        fmtEl.textContent      = String(e);
        actualWidthEl.textContent = '';
        actualBytesEl.textContent = '';
      }
    }

    function resetVals() {
      localStorage.clear();
      reloadVals();
      range();
    }

    function reloadVals() {
      const search = location.search ? new URLSearchParams(location.search) : null;

      let sql      = localStorage.getItem('sql');
      let nVal     = localStorage.getItem('n')       ?? '80';
      let iwVal    = localStorage.getItem('iw')      ?? '4';
      let spVal    = localStorage.getItem('spaces') === '1';
      let dialect  = localStorage.getItem('dialect') ?? 'materialize';
      let caseMode = localStorage.getItem('case')    ?? 'upper';

      if (sql === null) {
        sql = `SELECT count(*) count, winner, counter * (60 * 5) as counter FROM (SELECT winner, round(length / (60 * 5)) as counter FROM players WHERE build = $1 AND (hero = $2 OR region = $3)) WHERE data @> '{"data": {"domain": "github.com"}}'::JSON GROUP BY winner, counter;
INSERT INTO players(build, hero, region, winner, length) VALUES ($1, $2, $3, $4, $5);
UPDATE players SET count = 0 WHERE build = $1 AND (hero = $2 OR region = $3) LIMIT 1;`;
      }

      if (search) {
        if (search.has('sql'))     sql      = b64DecodeUnicode(search.get('sql'));
        if (search.has('n'))       nVal     = search.get('n');
        if (search.has('indent'))  iwVal    = search.get('indent');
        if (search.has('spaces'))  spVal    = search.get('spaces') === '1';
        if (search.has('dialect')) dialect  = search.get('dialect');
        if (search.has('case'))    caseMode = search.get('case');
      }

      sqlEl.value     = sql;
      nEl.value       = nVal;
      indentEl.value  = iwVal;
      spacesEl.checked = spVal;
      const dr = document.querySelector(`input[name="dialect"][value="${dialect}"]`);
      if (dr) dr.checked = true;
      const cr = document.querySelector(`input[name="case"][value="${caseMode}"]`);
      if (cr) cr.checked = true;
    }

    function autoPaste() {
      localStorage.setItem('paste', pasteEl.checked ? '1' : '0');
      if (pasteEl.checked) {
        navigator.clipboard.readText().then(text => { sqlEl.value = text; range(); });
      }
    }

    // Wire up all inputs
    [sqlEl, nEl, indentEl, spacesEl,
     ...document.querySelectorAll('input[name="dialect"]'),
     ...document.querySelectorAll('input[name="case"]'),
    ].forEach(el => el.addEventListener('input', range));

    document.getElementById('copy').addEventListener('click', () => copyTextToClipboard(fmtText));
    document.getElementById('reset').addEventListener('click', resetVals);
    document.getElementById('clear').addEventListener('click', () => { sqlEl.value = ''; range(); });
    pasteEl.addEventListener('change', autoPaste);

    // Clear URL search params after first edit so sharing a link doesn't lock state
    const search = location.search ? new URLSearchParams(location.search) : null;
    if (search) {
      const clearSearch = () => {
        window.history.replaceState(null, '', '/');
        sqlEl.removeEventListener('keydown', clearSearch);
      };
      sqlEl.addEventListener('keydown', clearSearch);
    }

    reloadVals();
    pasteEl.checked = localStorage.getItem('paste') === '1';
    if (!search?.has('sql')) autoPaste();
    range();
  </script>
</body>

</html>
